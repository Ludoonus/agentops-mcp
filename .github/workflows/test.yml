name: tests
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - name: Compile-check
        run: python3 -m py_compile agentops_mcp/server.py agentops_mcp/engine/*.py
      - name: Engine smoke
        run: python3 -c "from agentops_mcp.engine import transcripts; print('engine import ok')"
